[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E9", "F541", "F601", "F63", "F7", "F811", "F82", "F841"]

[tool.mypy]
python_version = "3.12"
files = ["main.py", "backend", "scripts"]
explicit_package_bases = true
ignore_missing_imports = true
check_untyped_defs = true
show_error_codes = true
allow_redefinition = true
disable_error_code = [
    "arg-type",
    "assignment",
    "attr-defined",
    "call-arg",
    "call-overload",
    "index",
    "misc",
    "name-defined",
    "no-redef",
    "operator",
    "override",
    "return-value",
    "type-var",
    "union-attr",
    "var-annotated",
]

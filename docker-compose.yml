services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tg_bot
      POSTGRES_PASSWORD: tg_bot
      POSTGRES_DB: tg_bot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_bot -d tg_bot"]
      interval: 5s
      timeout: 3s
      retries: 20

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped




name: tggrouprobot

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: tggrouprobot-bot:latest
    container_name: tggrouprobot-bot
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - infra_default

networks:
  infra_default:
    name: ${INFRA_NETWORK_NAME:-infra_default}
    external: true

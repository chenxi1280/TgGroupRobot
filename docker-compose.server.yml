name: tggrouprobot

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: tggrouprobot-bot:latest
    container_name: tggrouprobot-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-prod}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      GROUP_GUIDE_MESSAGE_DELETE_SECONDS: ${GROUP_GUIDE_MESSAGE_DELETE_SECONDS:-30}
      PROXY_URL: ${PROXY_URL:-}
      BOT_ADMIN_IDS: ${BOT_ADMIN_IDS:-}
      RENEW_CONTACT_USERNAME: ${RENEW_CONTACT_USERNAME:-}
      RENEW_CONTACT_LABEL: ${RENEW_CONTACT_LABEL:-一键联系}
      RENEWAL_CONTACT_URL: ${RENEWAL_CONTACT_URL:-}
      RENEWAL_CONTACT_LABEL: ${RENEWAL_CONTACT_LABEL:-一键联系}
    networks:
      - infra_default

  docs-site:
    build:
      context: .
      dockerfile: Dockerfile.docs-site
    image: tggrouprobot-docs-site:latest
    container_name: tggrouprobot-docs-site
    restart: unless-stopped
    ports:
      - "${DOCS_SITE_HOST_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - infra_default

networks:
  infra_default:
    name: ${INFRA_NETWORK_NAME:-infra_default}
    external: true
